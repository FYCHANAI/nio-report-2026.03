                  <span className="flex items-center gap-1.5 text-xs font-bold px-1 text-amber-500">
                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
                    {lang === 'zh' ? '明亮版' : 'Light'}
                  </span>
                ) : (
                  <span className="flex items-center gap-1.5 text-xs font-bold px-1 text-slate-600">
                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    {lang === 'zh' ? '深色版' : 'Dark'}
                  </span>
                )}
              </button>

              {/* Language Switcher */}
              <div className="bg-slate-100 dark:bg-slate-800 p-1 rounded-lg flex gap-1">
                <button
                  onClick={() => setLang('zh')}
                  className={`px-3 py-1 text-xs font-bold rounded-md transition-all ${lang === 'zh' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-400 hover:text-slate-600 dark:hover:text-slate-200'}`}
                >
                  繁中
                </button>
                <button
                  onClick={() => setLang('en')}
                  className={`px-3 py-1 text-xs font-bold rounded-md transition-all ${lang === 'en' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white' : 'text-slate-400 hover:text-slate-600 dark:hover:text-slate-200'}`}
                >
                  EN
                </button>
              </div>
            </div>
          </header>

          {/* ABSTRACT SECTION */}
          <div className="bg-white dark:bg-brand-cardDark border border-slate-200 dark:border-brand-borderDark p-5 rounded-xl shadow-sm grid md:grid-cols-4 gap-6 items-center">
            <div className="md:col-span-3 space-y-1">
              <h3 className="text-xs uppercase font-extrabold text-slate-400 tracking-wider flex items-center gap-1">
                <IconSparkles /> {t.abstractTitle}
              </h3>
              <p className="text-slate-600 dark:text-slate-300 font-medium leading-relaxed text-sm md:text-base">
                {t.abstract}
              </p>
            </div>
            <div className="bg-slate-50 dark:bg-slate-900 p-4 rounded-lg border border-slate-200/50 dark:border-slate-800 text-center">
              <span className="text-[10px] text-slate-400 uppercase tracking-widest font-extrabold block">2026 AI Roadmap</span>
              <span className="text-2xl font-black text-slate-800 dark:text-white font-display block mt-1">5 PHASES</span>
              <span className="text-[11px] text-green-500 font-bold block mt-0.5">Audit-Ready Focus</span>
            </div>
          </div>

          {/* STRATEGIC PROGRESSION LINE */}
          <div className="bg-white dark:bg-brand-cardDark border border-slate-200 dark:border-brand-borderDark p-5 rounded-xl shadow-sm">
            <h3 className="text-sm font-extrabold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-4 text-center md:text-left">
              {t.progTitle}
            </h3>
            
            <div className="grid grid-cols-1 md:grid-cols-5 gap-2 md:gap-4 items-center bg-slate-50 dark:bg-slate-900/60 p-3 rounded-lg border border-slate-200/30 dark:border-slate-800/30">
              {t.phases.map((step, idx) => (
                <div key={idx} className="flex items-center w-full">
                  <div 
                    onClick={() => setSelectedTab(idx === 3 ? 2 : idx === 4 ? 4 : idx)}
                    className={`flex-1 py-3.5 px-4 rounded-lg text-center cursor-pointer transition-all border-2 select-none
                      ${selectedTab === idx 
                        ? 'bg-slate-900 text-white dark:bg-white dark:text-slate-900 border-slate-900 dark:border-white shadow' 
                        : 'bg-white dark:bg-brand-navy border-slate-200 dark:border-slate-800 text-slate-500 dark:text-slate-400 hover:border-slate-400'
                      }`}
                  >
                    <span className="block text-[11px] uppercase tracking-wider font-extrabold opacity-60 mb-0.5">Stage 0{idx + 1}</span>
                    <span className="text-sm font-bold">{step}</span>
                  </div>
                  {idx < 4 && (
                    <IconArrowRight className="w-4 h-4 text-slate-300 dark:text-slate-700 mx-auto hidden md:block" />
                  )}
                </div>
              ))}
            </div>
          </div>

          {/* ROADMAP TIMELINE NODE MAP */}
          <div className="relative">
            {/* Timeline connector line */}
            <div className="absolute top-1/2 left-8 right-8 h-1 bg-slate-200 dark:bg-slate-800 -translate-y-1/2 hidden md:block"></div>
            
            <div className="grid grid-cols-1 md:grid-cols-5 gap-6 relative z-10">
              {phases.map((p, idx) => {
                const isActive = selectedTab === idx;
                const borderStyle = isActive ? p.colorClass.split(' ')[0] : 'border-slate-200 dark:border-slate-800/80';
                
                return (
                  <div
                    key={idx}
                    onClick={() => setSelectedTab(idx)}
                    className={`cursor-pointer bg-white dark:bg-brand-cardDark border-2 rounded-xl p-5 shadow-sm transition-all duration-300 transform hover:-translate-y-1 relative flex flex-col justify-between min-h-[190px]
                      ${borderStyle} 
                      ${isActive ? 'ring-4 ring-slate-500/10 scale-[1.03] shadow-md z-20' : 'opacity-80 hover:opacity-100'}`}
                  >
                    <div className="absolute -top-3.5 left-6 md:-top-3.5 md:left-1/2 md:-translate-x-1/2">
                      <span className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-black text-white ${p.dotColor} shadow-sm`}>
                        {p.num}
                      </span>
                    </div>

                    <div className="space-y-3 pt-2">
                      <span className="text-xs font-black uppercase tracking-wider opacity-60 block">
                        Phase {p.num}
                      </span>
                      <h4 className="font-extrabold text-base md:text-lg font-display text-slate-900 dark:text-white leading-tight">
                        {p.title}
                      </h4>
                      <p className="text-sm text-slate-500 dark:text-slate-400 line-clamp-2 leading-relaxed">
                        {p.focus}
                      </p>
                    </div>

                    <div className="mt-4 pt-3 border-t border-slate-100 dark:border-slate-800/80 flex items-center justify-between text-xs font-bold text-slate-400">
                      <span>{t.blueprintLabel}</span>
                      <IconArrowRight className="w-3.5 h-3.5" />
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* CORE ROADMAP WORK DETAILS */}
          <div className="bg-white dark:bg-brand-cardDark border border-slate-200 dark:border-brand-borderDark p-6 rounded-xl shadow-sm">
            
            {/* Header info */}
            <div className="flex flex-col md:flex-row md:items-start justify-between border-b border-slate-200 dark:border-slate-800 pb-4 mb-6 gap-4">
              <div>
                <span className="bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 text-sm font-bold px-2.5 py-1 rounded tracking-wide uppercase">
                  PHASE {phases[selectedTab].num} DELIVERABLES
                </span>
                <h3 className="text-3xl font-black text-slate-900 dark:text-white font-display mt-1.5">
                  {phases[selectedTab].title}
                </h3>
              </div>

              <div className="bg-slate-50 dark:bg-slate-900 p-3 rounded-lg border border-slate-100 dark:border-slate-800 max-w-md">
                <span className="text-[11px] uppercase font-black text-slate-400 tracking-widest">{t.messageLabel}</span>
                <p className="text-sm text-slate-700 dark:text-slate-300 font-medium italic mt-1 leading-relaxed">
                  "{phases[selectedTab].message}"
                </p>
              </div>
            </div>

            {/* Structured Project List */}
            <div className="space-y-4">
              
              {/* Phase 3 Special Positioning Banner */}
              {selectedTab === 2 && phases[2].positioning && (
                <div className="bg-orange-50 dark:bg-orange-950/20 border border-orange-200 dark:border-orange-900/40 p-4 rounded-lg flex items-start gap-2.5 text-sm text-orange-800 dark:text-orange-300 font-semibold">
                  <svg className="w-5 h-5 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                  </svg>
                  <span><strong>{t.blueprintLabel}:</strong> {phases[2].positioning}</span>
                </div>
              )}

              {/* Standard projects (Phases 1, 2, 3) */}
              {selectedTab < 3 && phases[selectedTab].projects && (
                <div className="grid md:grid-cols-3 gap-6">
                  {phases[selectedTab].projects.map((proj, idx) => (
                    <div key={idx} className="bg-slate-50 dark:bg-slate-900/40 p-5 rounded-lg border border-slate-100 dark:border-slate-800 flex flex-col justify-between">
                      <div className="space-y-2">
                        <div className="flex items-center gap-2">
                          <span className="w-6 h-6 rounded-full bg-slate-200 dark:bg-slate-800 text-xs font-bold flex items-center justify-center">
                            {idx + 1}
                          </span>
                          <h4 className="font-extrabold text-base text-slate-800 dark:text-slate-100">
                            {proj.name}
                          </h4>
                        </div>
                        <p className="text-sm text-slate-500 dark:text-slate-400 leading-relaxed pl-8">
                          {proj.desc}
                        </p>
                      </div>

                      {proj.link && (
                        <div className="pl-8 mt-2">
                          <a 
                            href={proj.link} 
                            target="_blank" 
                            rel="noopener noreferrer" 
                            className="inline-flex items-center gap-1.5 text-xs text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300 font-bold underline decoration-dotted animate-pulse"
                          >
                            <span>Visit: research.ntam.com.hk</span>
                            <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                              <path strokeLinecap="round" strokeLinejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                            </svg>
                          </a>
                        </div>
                      )}

                      {proj.badge && (
                        <div className="mt-4 pt-3 border-t border-slate-200/50 dark:border-slate-800/80 pl-8">
                          <span className="inline-block bg-white dark:bg-brand-navy border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 text-xs font-bold px-2 py-0.5 rounded">
                            {proj.badge}
                          </span>
                        </div>
                      )}

                    </div>
                  ))}
                </div>
              )}

              {/* Phase 4 Scope & capabilities (Two lists) */}
              {selectedTab === 3 && (
                <div className="grid md:grid-cols-2 gap-6">
                  <div className="bg-slate-50 dark:bg-slate-900/40 p-5 rounded-lg border border-slate-100 dark:border-slate-800 space-y-3">
                    <h4 className="font-extrabold text-sm uppercase text-slate-400 tracking-wider">
                      {phases[3].scopeTitle}
                    </h4>
                    <div className="grid grid-cols-2 gap-2">
                      {phases[3].scope.map((item, idx) => (
                        <div key={idx} className="bg-white dark:bg-brand-navy px-3.5 py-2.5 rounded text-sm font-semibold border border-slate-100 dark:border-slate-800 flex items-center gap-2">
                          <span className="w-1.5 h-1.5 rounded-full bg-purple-500"></span>
                          {item}
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="bg-slate-50 dark:bg-slate-900/40 p-5 rounded-lg border border-slate-100 dark:border-slate-800 space-y-3">
                    <h4 className="font-extrabold text-sm uppercase text-slate-400 tracking-wider">
                      {phases[3].capabilitiesTitle}
                    </h4>
                    <ul className="space-y-2">
                      {phases[3].capabilities.map((cap, idx) => (
                        <li key={idx} className="text-sm font-semibold text-slate-700 dark:text-slate-300 flex items-start gap-2">
                          <svg className="w-5 h-5 text-green-500 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                            <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                          </svg>
                          <span>{cap}</span>
                        </li>
                      ))}
                    </ul>
                  </div>
                </div>
              )}

              {/* Phase 5 DB workflow (Database objectives & pipeline flowchart) */}
              {selectedTab === 4 && (
                <div className="grid md:grid-cols-2 gap-6">
                  <div className="bg-slate-50 dark:bg-slate-900/40 p-5 rounded-lg border border-slate-100 dark:border-slate-800 space-y-3">
                    <h4 className="font-extrabold text-sm uppercase text-slate-400 tracking-wider">
                      {phases[4].objectivesTitle}
                    </h4>
                    <ul className="space-y-2">
                      {phases[4].objectives.map((obj, idx) => (
                        <li key={idx} className="text-sm font-semibold text-slate-700 dark:text-slate-300 flex items-start gap-2">
                          <span className="w-1.5 h-1.5 rounded-full bg-[#1E3E62] mt-2 flex-shrink-0"></span>
                          <span>{obj}</span>
                        </li>
                      ))}
                    </ul>
                  </div>

                  <div className="bg-slate-50 dark:bg-slate-900/40 p-5 rounded-lg border border-slate-100 dark:border-slate-800 space-y-4">
                    <h4 className="font-extrabold text-sm uppercase text-slate-400 tracking-wider">
                      {phases[4].workflowTitle}
                    </h4>
                    <div className="flex flex-col gap-2">
                      {phases[4].workflow.map((flow, idx) => (
                        <div key={idx} className="flex items-center gap-2">
                          <div className="bg-white dark:bg-brand-navy border border-slate-200 dark:border-slate-800 px-3.5 py-2.5 rounded text-sm font-extrabold text-center flex-1">
                            <span className="text-xs text-slate-400 mr-2">0{idx + 1}</span>
                            {flow}
                          </div>
                          {idx < 3 && (
                            <svg className="w-4 h-4 text-slate-400 mx-auto transform rotate-90 md:rotate-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                              <path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7" />
                            </svg>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

            </div>
          </div>

          {/* OVERALL BENEFITS MATRIX */}
          <div>
            <div className="mb-4 text-center md:text-left">
              <h3 className="text-2xl font-bold font-display text-slate-900 dark:text-white">
                {t.benefitsTitle}
              </h3>
            </div>

            <div className="grid md:grid-cols-3 gap-6">
              {benefits.map((card, idx) => (
                <div 
                  key={idx}
                  className="bg-white dark:bg-brand-cardDark border border-slate-200 dark:border-brand-borderDark rounded-xl p-5 shadow-sm hover:shadow-md transition-shadow flex flex-col justify-between"
                >
                  <div className="space-y-2.5">
                    <div className="flex items-center gap-2">
                      <span className="w-2.5 h-2.5 rounded-full bg-slate-900 dark:bg-white"></span>
                      <h4 className="font-black text-slate-800 dark:text-white text-base font-display">
                        {card.title}
                      </h4>
                    </div>
                    <p className="text-sm text-slate-500 dark:text-slate-400 leading-relaxed font-medium">
                      {card.desc}
                    </p>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* GOVERNANCE SAFEGUARDS PRINCIPLES */}
          <div className="bg-slate-100/70 dark:bg-[#0F172A]/50 border border-slate-200 dark:border-brand-borderDark rounded-xl p-6">
            <div className="mb-4">
              <h3 className="text-2xl font-bold font-display text-slate-900 dark:text-white">
                {t.govTitle}
              </h3>
            </div>

            <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
              {gov.map((item, idx) => (
                <div key={idx} className="bg-white dark:bg-brand-cardDark border border-slate-200/50 dark:border-slate-800/80 p-4 rounded-lg flex flex-col justify-between">
                  <div className="space-y-1.5">
                    <span className="text-xs font-black text-slate-400 block tracking-widest">
                      RULE 0{item.num}
                    </span>
                    <h5 className="font-extrabold text-slate-800 dark:text-slate-200 text-sm font-display">
                      {item.title}
                    </h5>
                    <p className="text-xs text-slate-500 dark:text-slate-400 leading-relaxed mt-1">
                      {item.desc}
                    </p>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* FINAL STRATEGIC SUMMARY STATEMENT */}
          <div className="bg-slate-900 text-white rounded-xl p-6 text-center border-2 border-slate-800 dark:border-slate-700/50 relative overflow-hidden">
            <span className="text-xs uppercase font-bold text-amber-400 tracking-widest">{t.taglineTitle}</span>
            <h2 className="text-lg md:text-2xl font-extrabold font-display mt-2 max-w-4xl mx-auto leading-relaxed">
              {t.tagline}
            </h2>
          </div>

          {/* FOOTER */}
          <footer className="pt-4 text-center text-xs text-slate-400 border-t border-slate-200 dark:border-slate-800">
            © 2026 Enterprise Transformation Operations Board. All Rights Reserved. Confidential.
          </footer>

        </div>
      );
    }

    // Mount to DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<RoadmapDashboard />);
  </script>
</body>
</html>
